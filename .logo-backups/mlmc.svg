<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <!-- Michelin Le Mans Cup stylized logo -->
  <defs>
    <linearGradient id="mlmc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3A6B"/>
      <stop offset="100%" stop-color="#234B8A"/>
    </linearGradient>
  </defs>
  <!-- Rounded banner shape -->
  <rect x="4" y="4" width="192" height="40" rx="8" fill="url(#mlmc-grad)"/>
  <!-- Michelin yellow accent stripe -->
  <rect x="4" y="4" width="192" height="4" rx="2" fill="#FCE300"/>
  <!-- "MLMC" large -->
  <text x="24" y="32" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="24" fill="#fff" letter-spacing="6">MLMC</text>
  <!-- "MICHELIN LE MANS CUP" tiny -->
  <text x="100" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="4.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">MICHELIN LE MANS CUP</text>
</svg>
