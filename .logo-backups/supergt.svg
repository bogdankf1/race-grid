<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <!-- Super GT stylized logo -->
  <defs>
    <linearGradient id="sgt-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF1A1A"/>
      <stop offset="100%" stop-color="#C20000"/>
    </linearGradient>
  </defs>
  <!-- Red swoosh background -->
  <path d="M2,24 C2,10 10,2 24,2 L170,2 C184,2 192,10 192,24 C192,38 184,46 170,46 L24,46 C10,46 2,38 2,24Z" fill="url(#sgt-grad)"/>
  <!-- "SUPER" small -->
  <text x="14" y="22" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="13" fill="rgba(255,255,255,0.85)" letter-spacing="3">SUPER</text>
  <!-- "GT" large -->
  <text x="95" y="38" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="36" fill="#fff" letter-spacing="2">GT</text>
  <!-- Underline accent -->
  <rect x="14" y="28" width="72" height="2.5" rx="1" fill="rgba(255,255,255,0.4)"/>
</svg>
