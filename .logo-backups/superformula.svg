<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48">
  <!-- Super Formula stylized logo -->
  <defs>
    <linearGradient id="sf-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A6E"/>
      <stop offset="100%" stop-color="#3A3ABA"/>
    </linearGradient>
  </defs>
  <!-- Background shape -->
  <path d="M4,8 L190,4 C200,3.5 206,8 208,16 L212,32 C214,40 210,46 200,46 L14,46 C6,46 2,40 2,32 L2,16 C2,10 3,8.5 4,8Z" fill="url(#sf-grad)"/>
  <!-- "SF" large -->
  <text x="16" y="36" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="32" fill="#fff" letter-spacing="-1">SF</text>
  <!-- Divider -->
  <rect x="62" y="10" width="2" height="28" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- "SUPER FORMULA" text -->
  <text x="72" y="24" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="11" fill="rgba(255,255,255,0.8)" letter-spacing="2">SUPER</text>
  <text x="72" y="39" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="14" fill="#fff" letter-spacing="1.5">FORMULA</text>
  <!-- Speed lines -->
  <line x1="170" y1="14" x2="205" y2="14" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="175" y1="22" x2="208" y2="22" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="170" y1="30" x2="210" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="175" y1="38" x2="205" y2="38" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg>
