<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <!-- ELMS stylized logo -->
  <defs>
    <linearGradient id="elms-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003E7E"/>
      <stop offset="100%" stop-color="#00529B"/>
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M10,4 L190,4 C194,4 196,6 196,10 L196,32 C196,42 100,48 100,48 C100,48 4,42 4,32 L4,10 C4,6 6,4 10,4Z" fill="url(#elms-grad)"/>
  <!-- "ELMS" large -->
  <text x="28" y="30" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="26" fill="#fff" letter-spacing="8">ELMS</text>
  <!-- Top accent line -->
  <rect x="28" y="8" width="144" height="2" rx="1" fill="#97C00E"/>
  <!-- "EUROPEAN LE MANS SERIES" tiny -->
  <text x="100" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="5" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1.5">EUROPEAN LE MANS SERIES</text>
</svg>
