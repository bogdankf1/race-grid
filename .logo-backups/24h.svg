<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4891A"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2B4A"/>
      <stop offset="100%" stop-color="#0F1B30"/>
    </linearGradient>
  </defs>
  <!-- Background shape -->
  <rect x="2" y="2" width="196" height="44" rx="6" ry="6" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- Accent stripe -->
  <rect x="10" y="36" width="80" height="2.5" rx="1.25" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- 24H text -->
  <text x="50" y="30" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="30" fill="url(#goldGrad)" letter-spacing="2">24H</text>
  <!-- SERIES text -->
  <text x="120" y="20" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="9" fill="#FFFFFF" letter-spacing="4" opacity="0.9">SERIES</text>
  <!-- Michelin branding line -->
  <text x="120" y="33" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="6.5" fill="#F5A623" letter-spacing="1.5" opacity="0.7">MICHELIN</text>
  <!-- Decorative checkered element -->
  <g opacity="0.3">
    <rect x="172" y="8" width="5" height="5" fill="#F5A623"/>
    <rect x="177" y="13" width="5" height="5" fill="#F5A623"/>
    <rect x="172" y="18" width="5" height="5" fill="#F5A623"/>
    <rect x="182" y="8" width="5" height="5" fill="#FFFFFF"/>
    <rect x="177" y="8" width="5" height="5" fill="#FFFFFF" opacity="0.15"/>
    <rect x="182" y="13" width="5" height="5" fill="#F5A623"/>
    <rect x="182" y="18" width="5" height="5" fill="#FFFFFF"/>
    <rect x="177" y="18" width="5" height="5" fill="#FFFFFF" opacity="0.15"/>
  </g>
</svg>
